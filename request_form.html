<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Blood Request Form</title>
    <link rel="stylesheet" type="text/css" href="./request_form.css">
    <link rel="icon" href="hivelogo.png" type="image/x-icon">
</head>
<body>

<header>
    <div class="logo">
        <img src="hivelogo.png" alt="Logo" style="width: 35%;">
    </div>
    <h1>Blood Request Form</h1>
</header>

<div class="form-container">
    <h2>Make a Blood Request:</h2>

    <!-- Error message area -->
    <div id="error-message" class="error-message"></div>

    <form id="request-form" action="submit_form.php" method="POST" onsubmit="return validateForm()">
        
        <!-- Personal Information -->
        <div class="form-group">
            <label for="name">Patient's Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter Your Name" required>
        </div>
        <div class="form-group">
            <label for="dob"> Patient's Date of Birth:</label>
            <input type="date" id="dob" name="dob" placeholder="Enter Your DOB"required>
        </div>
        <div class="form-group">
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter Your Phone Number"required>
        </div>
        <!--Gender-->
        <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender" name="gender"required>
                <option value="">Select your Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" placeholder="Enter Your Email"required>
        </div>

        
        <!-- Reason for blood Request -->
        <div class="form-group">
            <label for="reason">Reason for Blood Request:</label>
            <textarea id="reason" name="reason" rows="5" placeholder="Enter Reason..." required></textarea>
        </div>

        <!-- Eligibility -->
        <div class="form-group">
            <label for="donation-type">Blood Type:</label>
            <select id="donation-type" name="donation-type" required>
                <option value="">Select your blood type</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
            </select>
        </div>
        <div class="form-group">
            <label for="unit">Units(in ml):</label>
            <input type="tel" id="unit" name="unit" placeholder="Enter Blood Amount (in ml):"required>
        </div>

        <button type="submit" class="submit-btn">Submit</button>
        <button type="reset" class="submit-btn">Reset</button>
    </form>
</div>


<script>
    function validateForm() {
        // Clear any previous error messages
        document.getElementById('error-message').innerHTML = '';
         // Additional validation checks can go here if needed
         const name = document.getElementById('name').value;
         const dob = document.getElementById('dob').value;
         const phone = document.getElementById('phone').value;
         const email = document.getElementById('email').value;
         const reason = document.getElementById('reason').value;
         const bloodType = document.getElementById('donation-type').value;
         const unit = document.getElementById('unit').value;

         // Basic validation checks
         if (!name || !dob || !phone || !email || !reason || !bloodType || !unit) {
            document.getElementById('error-message').innerHTML = "Please fill in all required fields.";
            return false;  // Stop the form submission
         }

         window.location.href = 'patientRedirect.html';
        return false;
    }
</script>

</body>
</html>
